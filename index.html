<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KBC Quiz</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: Arial;
  text-align: center;
  color: white;

  /* FULL BACKGROUND IMAGE */
  background: url("bg.png") no-repeat center center/cover;
  height:100vh;
}

/* OVERLAY (dark effect) */
body::before{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* LOGO TOP */
.logo {
  width:120px;
  margin:20px auto;
  display:block;
}

/* TITLE */
h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
  font-size: 28px;
}

/* CENTER BOX */
.container {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:80vh;
}

/* QUESTION */
.question {
  font-size: 22px;
  margin-bottom: 20px;
}

/* OPTIONS */
.option {
  width:90%;
  max-width:400px;
  margin:10px;
  padding:12px;
  border-radius:30px;
  border:2px solid #00eaff;
  background:#001f3f;
  box-shadow:0 0 10px #00eaff;
  cursor:pointer;
  transition:0.3s;
}

.option:hover {
  transform:scale(1.05);
}

.correct {
  background:green !important;
  box-shadow:0 0 20px lime;
}

.wrong {
  background:red !important;
  box-shadow:0 0 20px red;
}

/* INPUT + BUTTON */
input, button {
  padding:10px;
  font-size:16px;
  border-radius:10px;
  border:none;
  margin:5px;
}

button {
  background:gold;
  cursor:pointer;
}

/* LEADERBOARD */
#leaderboard {
  margin-top:20px;
}

li {
  list-style:none;
  font-size:18px;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width:600px){
  h1{font-size:20px;}
  .question{font-size:18px;}
  .option{font-size:14px;}
  .logo{width:90px;}
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h1>Entrance Test</h1>

<div class="container">

<div id="start">
  <input id="name" placeholder="Enter Name">
  <br>
  <button onclick="startQuiz()">Start</button>
</div>

<div id="quiz" style="display:none;">
  <div class="question" id="question"></div>
  <div id="options"></div>
  <button onclick="next()">Next</button>
</div>

<div id="result">
  <h2>🏆 Leaderboard</h2>
  <ul id="leaderboard"></ul>
</div>

</div>

<script>
let quiz = [
  {q:"भारत की राजधानी?", options:["मुंबई","दिल्ली","चेन्नई","कोलकाता"], answer:1},
  {q:"5 + 5 ?", options:["8","10","12","15"], answer:1}
];

let i=0;
let name="";
let data = JSON.parse(localStorage.getItem("kbc")) || [];

function startQuiz(){
  name = document.getElementById("name").value;
  if(!name) return alert("Name likho");

  document.getElementById("start").style.display="none";
  document.getElementById("quiz").style.display="block";

  loadQ();
}

function loadQ(){
  document.getElementById("question").innerText = quiz[i].q;

  let html="";
  quiz[i].options.forEach((opt,index)=>{
    html += `<div class="option" onclick="check(this,${index})">
      ${String.fromCharCode(65+index)}. ${opt}
    </div>`;
  });

  document.getElementById("options").innerHTML = html;
}

function check(el,ans){
  let all=document.querySelectorAll(".option");
  all.forEach(o=>o.onclick=null);

  let score=0;

  if(ans===quiz[i].answer){
    el.classList.add("correct");
    score=1;
  }else{
    el.classList.add("wrong");
  }

  data.push({name,score});
  localStorage.setItem("kbc",JSON.stringify(data));

  show();
}

function next(){
  i++;
  if(i>=quiz.length) i=0;

  document.getElementById("start").style.display="block";
  document.getElementById("quiz").style.display="none";
  document.getElementById("name").value="";
}

function show(){
  data.sort((a,b)=>b.score-a.score);

  let html="";
  data.forEach((p,index)=>{
    let rank = index==0?"🥇":index==1?"🥈":index==2?"🥉":index+1;
    html+=`<li>${rank} ${p.name} - ${p.score}</li>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

show();
</script>

</body>
</html>
