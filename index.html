<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KBC Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle,#001f3f,#000);
}

.logo{
  width:100px;
  margin:15px auto;
}

.heading{
  font-size:24px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 10px #00eaff;
  margin-bottom:15px;
}

.panel{
  width:95%;
  max-width:900px;
  margin:auto;
  padding:20px;
  border:3px solid #00eaff;
  border-radius:20px;
  box-shadow:0 0 25px #00eaff;
}

.question-box{
  border:3px solid gold;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  font-size:22px;
}

.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.option{
  padding:15px;
  border-radius:30px;
  border:2px solid #00eaff;
  background:#001f3f;
  box-shadow:0 0 10px #00eaff;
  cursor:pointer;
}

.correct{background:green !important;}
.wrong{background:red !important;}

.blink{
  animation:blink 0.6s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

button{
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:2px solid #00eaff;
  background:#001f3f;
  color:white;
  box-shadow:0 0 10px #00eaff;
  cursor:pointer;
}

li{
  list-style:none;
  font-size:18px;
}

@media(max-width:600px){
  .options{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<!-- FIRST PAGE -->
<div id="start" class="panel">

<div class="heading">Islamic Children Academy Entrance Test</div>

<input id="name" placeholder="Enter Name">
<br>
<button onclick="startQuiz()">Start</button>

<!-- 🔄 RESET -->
<button onclick="resetAll()">Reset Game</button>

<!-- 🏆 LEADERBOARD -->
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>

</div>

<!-- QUIZ PAGE -->
<div id="quiz" class="panel" style="display:none;">

<div class="question-box" id="question"></div>

<div class="options" id="options"></div>

<button onclick="lockAnswer()">🔒 Lock</button>
<button onclick="next()">Next</button>

</div>

<!-- 🔊 SOUNDS -->
<audio id="lockSound" src="lock.mp3"></audio>
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>
let quiz=[
{q:"भारत की राजधानी?", options:["मुंबई","दिल्ली","चेन्नई","कोलकाता"], answer:1},
{q:"5+5?", options:["8","10","12","15"], answer:1}
];

let i=0,name="";
let selected=null;
let data=JSON.parse(localStorage.getItem("kbc"))||[];

function startQuiz(){
name=document.getElementById("name").value;
if(!name) return alert("Name likho");

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

loadQ();
}

function loadQ(){
selected=null;

document.getElementById("question").innerText=quiz[i].q;

let html="";
quiz[i].options.forEach((opt,index)=>{
html+=`<div class="option" onclick="select(this,${index})">
${String.fromCharCode(65+index)}. ${opt}
</div>`;
});

document.getElementById("options").innerHTML=html;
}

function select(el,index){
let all=document.querySelectorAll(".option");
all.forEach(o=>o.style.background="#001f3f");

el.style.background="#333";
selected=index;
}

function lockAnswer(){
if(selected===null) return alert("Option select karo");

let lock=document.getElementById("lockSound");
lock.currentTime=0;
lock.play();

let all=document.querySelectorAll(".option");
all.forEach(o=>o.onclick=null);

let correct=quiz[i].answer;

all[correct].classList.add("blink");

setTimeout(()=>{
all[correct].classList.remove("blink");
all[correct].classList.add("correct");

if(selected===correct){
let c=document.getElementById("correctSound");
c.currentTime=0;
c.play();
}else{
all[selected].classList.add("wrong");
let w=document.getElementById("wrongSound");
w.currentTime=0;
w.play();
}

let score=(selected===correct)?1:0;
data.push({name,score});
localStorage.setItem("kbc",JSON.stringify(data));

show();

},2000);
}

function next(){
i++;
if(i>=quiz.length) i=0;

document.getElementById("quiz").style.display="none";
document.getElementById("start").style.display="block";
document.getElementById("name").value="";
}

function show(){
data.sort((a,b)=>b.score-a.score);

let html="";
data.forEach((p,index)=>{
let rank=index==0?"🥇":index==1?"🥈":index==2?"🥉":index+1;
html+=`<li>${rank} ${p.name} - ${p.score}</li>`;
});

document.getElementById("leaderboard").innerHTML=html;
}

/* 🔄 RESET */
function resetAll(){
localStorage.clear();
location.reload();
}

/* 🔤 AUTO CAPITAL */
document.getElementById("name").addEventListener("input", function(e){
let words=e.target.value.toLowerCase().split(" ");
for(let i=0;i<words.length;i++){
if(words[i]){
words[i]=words[i][0].toUpperCase()+words[i].slice(1);
}
}
e.target.value=words.join(" ");
});

show();
</script>

</body>
</html>
